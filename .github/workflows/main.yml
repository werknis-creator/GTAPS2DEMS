name: Build PS2 Game
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apk add --no-cache make g++ mpc1-dev mpfr-dev gmp-dev

      - name: Compile Game
        run: |
          make

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Game-File
          path: MAIN.ELF
